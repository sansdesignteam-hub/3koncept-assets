<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Starfall Scrub — Local Preview</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; color:#fff; font-family:-apple-system,BlinkMacSystemFont,"Inter",sans-serif; }
  .spacer { height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:2rem; }
  .spacer p { opacity:.5; font-size:.9rem; letter-spacing:.08em; text-transform:uppercase; }
  /* Gradient background proves the frames are genuinely transparent —
     if you see a black box around the stars, alpha handling is broken. */
  .section-star-falling { position:relative; height:100vh; overflow:hidden;
    background:linear-gradient(160deg,#0b1026 0%,#1a1040 45%,#2a1a4a 100%); }
  .starfall-canvas { position:absolute; inset:0; width:100%; height:100%; display:block;
    background:transparent; pointer-events:none; }
  #hud { position:fixed; top:12px; left:12px; z-index:99; font:12px/1.5 ui-monospace,monospace;
         background:rgba(0,0,0,.6); border:1px solid rgba(255,255,255,.15); padding:8px 12px; border-radius:6px; }
</style>
</head>
<body>

<div id="hud">loading…</div>

<div class="spacer"><p>Scroll ke bawah ↓</p></div>

<section class="section-star-falling">
  <canvas id="starfall-canvas" class="starfall-canvas"></canvas>
</section>

<div class="spacer"><p>Section berikutnya</p></div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script>
(function () {
  'use strict';

  var CONFIG = {
    mode: 'sprite',
    sheets: [
      '../sprites/starfall_sheet_1.webp',
      '../sprites/starfall_sheet_2.webp',
      '../sprites/starfall_sheet_3.webp',
      '../sprites/starfall_sheet_4.webp',
      '../sprites/starfall_sheet_5.webp',
      '../sprites/starfall_sheet_6.webp',
      '../sprites/starfall_sheet_7.webp'
    ],
    cellWidth: 960, cellHeight: 728, cols: 5, perSheet: 25,
    frameCount: 151, scrollLength: '+=300%', scrub: 0.6,
    pinSpacing: true, maxDPR: 2, debug: false
  };

  var section = document.querySelector('.section-star-falling');
  var canvas  = document.getElementById('starfall-canvas');
  var hud     = document.getElementById('hud');
  var ctx     = canvas.getContext('2d', { alpha:true });
  gsap.registerPlugin(ScrollTrigger);

  var state = { frame:0, images:[], ready:false, dw:0, dh:0, dx:0, dy:0 };
  var loaded = 0;

  function loadImage(src){
    return new Promise(function(res){
      var i = new Image();
      i.decoding = 'async';
      i.onload  = function(){ loaded++; hud.textContent = 'sheets '+loaded+'/'+CONFIG.sheets.length; res(i); };
      i.onerror = function(){ hud.textContent = 'ERROR loading '+src; res(null); };
      i.src = src;
    });
  }

  function resize(){
    var dpr = Math.min(window.devicePixelRatio||1, CONFIG.maxDPR);
    var cw = canvas.clientWidth, ch = canvas.clientHeight;
    if(!cw||!ch) return;
    canvas.width = Math.round(cw*dpr); canvas.height = Math.round(ch*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    var scale = Math.max(cw/CONFIG.cellWidth, ch/CONFIG.cellHeight);
    state.dw = CONFIG.cellWidth*scale;  state.dh = CONFIG.cellHeight*scale;
    state.dx = (cw-state.dw)/2;         state.dy = (ch-state.dh)/2;
    render(state.frame);
  }

  function render(ff){
    if(!state.ready) return;
    var f = Math.min(CONFIG.frameCount-1, Math.max(0, Math.round(ff)));
    var si = Math.floor(f/CONFIG.perSheet), lo = f%CONFIG.perSheet;
    var sheet = state.images[si];
    if(!sheet) return;
    ctx.clearRect(0,0,canvas.clientWidth,canvas.clientHeight);
    ctx.drawImage(sheet,
      (lo%CONFIG.cols)*CONFIG.cellWidth, Math.floor(lo/CONFIG.cols)*CONFIG.cellHeight,
      CONFIG.cellWidth, CONFIG.cellHeight,
      state.dx, state.dy, state.dw, state.dh);
    hud.textContent = 'frame ' + (f+1) + ' / ' + CONFIG.frameCount + '  ·  sheet ' + (si+1);
  }

  gsap.to(state, {
    frame: CONFIG.frameCount-1, ease:'none',
    scrollTrigger:{ trigger:section, start:'top top', end:CONFIG.scrollLength,
      pin:true, pinSpacing:CONFIG.pinSpacing, scrub:CONFIG.scrub,
      anticipatePin:1, invalidateOnRefresh:true, markers:CONFIG.debug },
    onUpdate: function(){ render(state.frame); }
  });

  resize();
  Promise.all(CONFIG.sheets.map(function(s,i){
    return loadImage(s).then(function(img){ state.images[i]=img; if(i===0){ state.ready=true; resize(); } });
  })).then(function(){ resize(); ScrollTrigger.refresh(); });

  var rt; window.addEventListener('resize', function(){ clearTimeout(rt); rt=setTimeout(resize,150); });
})();
</script>
</body>
</html>
