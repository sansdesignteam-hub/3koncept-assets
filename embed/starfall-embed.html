<!-- ==========================================================================
  3Koncept — Star Falling · GSAP ScrollTrigger Canvas Scrub
  --------------------------------------------------------------------------
  PASTE LOCATION : Webflow → inside .section-star-falling → HTML Embed
  DEPENDENCIES   : GSAP 3 + ScrollTrigger (load in Page Settings → head, see docs)
  VERSION        : 1.0
========================================================================== -->

<canvas id="starfall-canvas" class="starfall-canvas"></canvas>

<style>
  /* Section wrapper is styled in Webflow Designer (.section-star-falling).
     These rules only cover the canvas itself so Designer stays the source of truth. */
  .starfall-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 1;
    /* Frames have an alpha channel — keep the canvas transparent so whatever
       you put behind it in Webflow (bg colour, gradient, image) shows through. */
    background: transparent;
    pointer-events: none;
  }
</style>

<script>
(function () {
  'use strict';

  /* ======================================================================
     1. CONFIG — this is the only block you normally need to edit
     ====================================================================== */
  var CONFIG = {

    // 'sprite'   → few large sheet images (RECOMMENDED for pure-Webflow hosting)
    // 'sequence' → one file per frame (use with jsDelivr / Cloudinary / S3)
    mode: 'sequence',

    // --- SPRITE MODE -----------------------------------------------------
    // Paste your 7 Webflow asset URLs here, IN ORDER (sheet_1 → sheet_7).
    sheets: [
      'PASTE_URL_SHEET_1',
      'PASTE_URL_SHEET_2',
      'PASTE_URL_SHEET_3',
      'PASTE_URL_SHEET_4',
      'PASTE_URL_SHEET_5',
      'PASTE_URL_SHEET_6',
      'PASTE_URL_SHEET_7'
    ],
    cellWidth:  960,   // from sprites/manifest.json — do not change
    cellHeight: 728,   // from sprites/manifest.json — do not change
    cols:       5,
    perSheet:   25,

    // --- SEQUENCE MODE ---------------------------------------------------
    // {i} is replaced by the zero-padded frame number (0001, 0002, …)
    sequenceUrl: 'https://cdn.jsdelivr.net/gh/sansdesignteam-hub/3koncept-assets@main/frames/frame_{i}.webp',
    pad: 4,

    // --- SHARED ----------------------------------------------------------
    frameCount:  151,       // total frames in the sequence
    scrollLength: '+=300%', // scroll distance the section is pinned for
    scrub:        0.6,      // 0 = locked to scroll · 0.5–1 = smooth lag (recommended)
    pinSpacing:   true,
    maxDPR:       2,        // cap devicePixelRatio (perf guard on retina)
    debug:        false     // true → ScrollTrigger markers
  };

  /* ======================================================================
     2. BOOT
     ====================================================================== */
  var section = document.querySelector('.section-star-falling');
  var canvas  = document.getElementById('starfall-canvas');

  if (!section || !canvas) {
    console.warn('[starfall] .section-star-falling or #starfall-canvas not found — aborting.');
    return;
  }
  if (typeof gsap === 'undefined' || typeof ScrollTrigger === 'undefined') {
    console.error('[starfall] GSAP or ScrollTrigger is missing. Add the CDN scripts to Page Settings → head.');
    return;
  }
  gsap.registerPlugin(ScrollTrigger);

  // alpha:true is REQUIRED — the frames are transparent PNG-style WebP.
  var ctx = canvas.getContext('2d', { alpha: true });
  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var state = {
    frame: 0,          // current frame, float (GSAP tweens this)
    images: [],        // loaded Image objects (sheets or frames)
    ready: false,
    dw: 0, dh: 0, dx: 0, dy: 0   // cover-fit destination rect
  };

  /* ======================================================================
     3. LOADING
     ====================================================================== */
  function loadImage(src) {
    return new Promise(function (resolve) {
      var img = new Image();
      img.crossOrigin = 'anonymous';
      img.decoding = 'async';
      img.onload  = function () { resolve(img); };
      img.onerror = function () {
        console.warn('[starfall] failed to load', src);
        resolve(null);
      };
      img.src = src;
    });
  }

  function buildSources() {
    if (CONFIG.mode === 'sprite') return CONFIG.sheets.slice();
    var out = [];
    for (var i = 1; i <= CONFIG.frameCount; i++) {
      out.push(CONFIG.sequenceUrl.replace('{i}', String(i).padStart(CONFIG.pad, '0')));
    }
    return out;
  }

  function preload() {
    var sources = buildSources();
    // Sprite mode: load sheet 1 first so we can paint immediately, then the rest.
    return loadImage(sources[0]).then(function (first) {
      state.images[0] = first;
      state.ready = true;
      resize();
      render(0);
      return Promise.all(
        sources.slice(1).map(function (src, i) {
          return loadImage(src).then(function (img) { state.images[i + 1] = img; });
        })
      );
    });
  }

  /* ======================================================================
     4. SIZING — "object-fit: cover" for canvas
     ====================================================================== */
  function sourceSize() {
    if (CONFIG.mode === 'sprite') return { w: CONFIG.cellWidth, h: CONFIG.cellHeight };
    var img = state.images[0];
    return img ? { w: img.naturalWidth, h: img.naturalHeight } : { w: 16, h: 9 };
  }

  function resize() {
    var dpr = Math.min(window.devicePixelRatio || 1, CONFIG.maxDPR);
    var cw  = canvas.clientWidth;
    var ch  = canvas.clientHeight;
    if (!cw || !ch) return;

    canvas.width  = Math.round(cw * dpr);
    canvas.height = Math.round(ch * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    var s = sourceSize();
    var scale = Math.max(cw / s.w, ch / s.h);   // cover
    state.dw = s.w * scale;
    state.dh = s.h * scale;
    state.dx = (cw - state.dw) / 2;
    state.dy = (ch - state.dh) / 2;

    render(state.frame);
  }

  /* ======================================================================
     5. RENDER
     ====================================================================== */
  function render(frameFloat) {
    if (!state.ready) return;

    var f = Math.min(CONFIG.frameCount - 1, Math.max(0, Math.round(frameFloat)));

    // MUST clear first. Transparent frames composite on top of each other
    // otherwise, and the section turns into a smeared accumulation of every
    // frame the user has scrolled through.
    // Resolve the source BEFORE clearing. If the asset isn't loaded yet we bail
    // out and leave the previous frame on screen — clearing first would flash a
    // hole in the animation every time we outrun the preloader.
    var sheetIndex, local, sx, sy, img;

    if (CONFIG.mode === 'sprite') {
      sheetIndex = Math.floor(f / CONFIG.perSheet);
      local      = f % CONFIG.perSheet;
      img        = state.images[sheetIndex];
      if (!img) return;
      sx = (local % CONFIG.cols) * CONFIG.cellWidth;
      sy = Math.floor(local / CONFIG.cols) * CONFIG.cellHeight;
    } else {
      img = state.images[f];
      if (!img) return;
    }

    ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);

    if (CONFIG.mode === 'sprite') {
      ctx.drawImage(
        img,
        sx, sy, CONFIG.cellWidth, CONFIG.cellHeight,
        state.dx, state.dy, state.dw, state.dh
      );
    } else {
      ctx.drawImage(img, state.dx, state.dy, state.dw, state.dh);
    }
  }

  /* ======================================================================
     6. SCROLLTRIGGER
     ====================================================================== */
  function initScroll() {
    if (reduceMotion) {
      // Accessibility: no scrub, paint a single representative frame.
      render(Math.floor(CONFIG.frameCount / 2));
      return;
    }

    gsap.to(state, {
      frame: CONFIG.frameCount - 1,
      ease: 'none',
      scrollTrigger: {
        trigger: section,
        start: 'top top',
        end: CONFIG.scrollLength,
        pin: true,
        pinSpacing: CONFIG.pinSpacing,
        scrub: CONFIG.scrub,
        anticipatePin: 1,
        invalidateOnRefresh: true,
        markers: CONFIG.debug
      },
      onUpdate: function () { render(state.frame); }
    });
  }

  /* ======================================================================
     7. GO
     ====================================================================== */
  resize();
  initScroll();

  preload().then(function () {
    resize();
    ScrollTrigger.refresh();
    section.setAttribute('data-starfall', 'ready');
  });

  // Debounced resize — avoids thrash on mobile URL-bar show/hide
  var rt;
  window.addEventListener('resize', function () {
    clearTimeout(rt);
    rt = setTimeout(resize, 150);
  });
})();
</script>
